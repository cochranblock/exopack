[book]
title = "exopack"
description = "Test augmentation library. Deterministic fixtures, harvest pipeline, two-binary tripwire."
authors = ["Michael Cochran"]
language = "en"
src = "src"

[output.html]
git-repository-url = "https://github.com/cochranblock/exopack"
edit-url-template = "https://github.com/cochranblock/exopack/edit/main/docs/src/{path}"
site-url = "/exopack/"
additional-css = ["theme/custom.css"]
additional-js = ["theme/force-theme.js"]
default-theme = "coal"
preferred-dark-theme = "coal"
no-section-label = true

[output.html.fold]
enable = true
level = 1
